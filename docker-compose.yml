services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hanzi-flow
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_PATH: /app/data/hanzi-flow.db
    ports:
      - "${WEB_PORT:-3001}:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
